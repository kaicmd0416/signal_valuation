# ============================================================
# 按指数分别合成因子配置 (生产环境)
# ============================================================
# 当前策略: ATER + PE + ROA 等权合成 (fm04_hs300)
# vp08/a3 为异常数据，禁止使用
# ============================================================

backtest:
  start_date: "2023-07-01"
  end_date: "2026-03-13"
  n_groups: 5
  stock_number: 500

weight_method: "equal"
ic_window: 60
smooth_window: 1
date_mode: "available_date"

indices:
  hs300:
    output_name: "fm04_hs300"
    factors:
      - name: "ATER"
        direction: 1
      - name: "PE"
        direction: 1
      - name: "ROA"
        direction: 1
