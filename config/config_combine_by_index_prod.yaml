# ============================================================
# 按指数分别合成因子配置 (两层IC加权)
# ============================================================
# Level 1: 簇内IC加权 — 同簇高相关因子先合成为一个"簇因子"
# Level 2: 簇间IC加权 — 各簇因子间再做IC加权合成
#
# 高相关因子簇:
#   估值: PB/PCF/PE/PS (corr 0.7~0.93)
#   换手: turnoverRateAvg20d/120d (corr 0.96)
#   反转: RTN1/RTN3/RTN6/RTN12 (corr 0.5~0.85)
#   市值: LnFloatCap/LnFloatCap1 (corr 0.94)
#   盈利: ROA/ROE/OCFTD (corr 0.6~0.8)
#
# 选簇原则: 簇内至少一个因子 |IR| >= 0.10
# vp08/a3 为异常数据，禁止使用
# ============================================================

backtest:
  start_date: "2023-07-01"
  end_date: "2026-03-12"
  n_groups: 5
  stock_number: 500

weight_method: "equal"
ic_window: 60
smooth_window: 1
date_mode: "available_date"

indices:
  hs300:
    output_name: "fm04_hs300"
    factors:
      - name: "PCF"
        direction: 1
      - name: "PE"
        direction: 1
      - name: "ATER"
        direction: 1
