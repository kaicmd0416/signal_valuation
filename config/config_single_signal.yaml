# ============================================================
# 单因子回测配置
# ============================================================
# run_all.py single 使用此配置
# 注: a3/vp08 为异常数据，禁止使用

backtest:
  start_date: "2023-07-01"
  end_date: "2026-03-10"
  n_groups: 5
  top_n: 200
  index_list: ["hs300", "zz500", "zz1000", "zz2000", "zzA500"]

signals:
  # --- 流动性/换手率因子 ---
  - "turnoverRateAvg20d"
  - "turnoverRateAvg120d"
  - "ILLIQ"
  - "TurnoverRateChange"
  # --- 估值因子 ---
  - "PB"
  - "PCF"
  - "PE"
  - "PS"
  # --- 盈利质量因子 ---
  - "OCFPR"
  - "OCFTD"
  - "GPG"
  - "ROA"
  - "ROE"
  - "GrossProfitTTM"
  - "NetProfitTTM"
  # --- 动量/反转因子 ---
  - "RTN1"
  - "RTN3"
  - "RTN6"
  - "RTN12"
  - "CTA"
  # --- 市值因子 ---
  - "LnFloatCap"
  - "LnFloatCap1"
  # --- 财务/运营效率因子 ---
  - "ATER"
  - "DTA"
  - "FAT"
  - "LDTWC"
  - "TAT"
