backtest:
  start_date: "2023-07-01"
  end_date: "2026-03-10"
  n_groups: 5
  stock_number: 400

weight_method: "equal"
ic_window: 60
smooth_window: 1
date_mode: "available_date"

indices:
  hs300:
    output_name: "test_hs300_PCF_PB_ILLIQ_ATER"
    factors:
      - name: "PCF"
        direction: 1
      - name: "PB"
        direction: 1
      - name: "ILLIQ"
        direction: -1
      - name: "ATER"
        direction: 1
